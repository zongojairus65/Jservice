version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: jservices_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-jservices}
      POSTGRES_USER:     ${DB_USER:-jservices_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jservices_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [jservices_net]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jservices_api
    restart: unless-stopped
    environment:
      ENV:          ${ENV:-development}
      PORT:         8080
      DATABASE_URL: postgres://${DB_USER:-jservices_user}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-jservices}?sslmode=disable
      JWT_SECRET:   ${JWT_SECRET:?JWT_SECRET required}
      JWT_EXPIRY:   ${JWT_EXPIRY:-24h}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/app/migrations:ro
    networks: [jservices_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL:   ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_WS_URL:    ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080}
        NEXT_PUBLIC_WA_NUMBER: ${NEXT_PUBLIC_WA_NUMBER:-22672157058}
        NEXT_PUBLIC_SITE_URL:  ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    container_name: jservices_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on: [backend]
    networks: [jservices_net]

  nginx:
    image: nginx:1.27-alpine
    container_name: jservices_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [frontend, backend]
    networks: [jservices_net]

volumes:
  postgres_data:

networks:
  jservices_net:
    driver: bridge
